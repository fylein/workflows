name: Validate pnpm config

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  require-pnpm-files:
    name: Validate pnpm config - Require pnpm lockfile and workspace file
    runs-on: ubuntu-latest
    outputs:
      pnpm_workspace_changed: ${{ steps.workspace_files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect pnpm-workspace.yaml changes
        id: workspace_files
        uses: tj-actions/changed-files@v47.0.6
        with:
          files: |
            pnpm-workspace.yaml

      - name: Require pnpm-lock.yaml and pnpm-workspace.yaml at repo root
        shell: bash
        run: |
          set -euo pipefail
          root="${GITHUB_WORKSPACE}"
          missing=0
          if [[ ! -f "${root}/pnpm-lock.yaml" ]]; then
            echo "::error title=validate pnpm config::Missing pnpm-lock.yaml at the repository root (expected next to package.json)."
            missing=1
          fi
          if [[ ! -f "${root}/pnpm-workspace.yaml" ]]; then
            echo "::error title=validate pnpm config::Missing pnpm-workspace.yaml at the repository root."
            missing=1
          fi
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi
          echo "pnpm-lock.yaml and pnpm-workspace.yaml are present."

  validate-pnpm-workspace:
    name: Validate pnpm config - Validate pnpm-workspace.yaml policy
    runs-on: ubuntu-latest
    needs: require-pnpm-files
    if: needs.require-pnpm-files.outputs.pnpm_workspace_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve workflows repository ref
        id: workflows_ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          ref="${WORKFLOW_REF##*@}"
          ref="${ref#refs/heads/}"
          ref="${ref#refs/tags/}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout workflows repository for validator script
        uses: actions/checkout@v6
        with:
          repository: fylein/workflows
          ref: ${{ steps.workflows_ref.outputs.ref }}
          path: .workflows-repo

      - name: Validate pnpm-workspace.yaml
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check -q 'PyYAML==6.0.2'
          python3 .workflows-repo/scripts/validate_pnpm_workspace.py
